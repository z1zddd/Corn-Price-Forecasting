id: external_support
name: 外部支撑因子
group: external
instrument: corn
frequencies: [weekly, monthly, yearly]
inputs:
  - dce_corn_close
calculation:
  method: derived_from_existing_matrix
  expression: factor_external_support
leakage_control:
  uses_future_target: false
  requires_lag: true
  asof_policy: period_end
quality:
  coverage_column: factor_external_support_coverage
outputs:
  - factor_id: external_support
    value_column: factor_external_support
