id: market_activity
name: 市场活跃度因子
group: market
instrument: corn
frequencies: [weekly, monthly, yearly]
inputs:
  - dce_corn_close
calculation:
  method: derived_from_existing_matrix
  expression: factor_market_activity
leakage_control:
  uses_future_target: false
  requires_lag: true
  asof_policy: period_end
quality:
  coverage_column: factor_market_activity_coverage
outputs:
  - factor_id: market_activity
    value_column: factor_market_activity
