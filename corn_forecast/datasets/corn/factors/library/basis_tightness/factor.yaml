id: basis_tightness
name: 基差紧张度因子
group: basis
instrument: corn
frequencies: [weekly, monthly, yearly]
inputs:
  - dce_corn_close
calculation:
  method: derived_from_existing_matrix
  expression: factor_basis_tightness
leakage_control:
  uses_future_target: false
  requires_lag: true
  asof_policy: period_end
quality:
  coverage_column: factor_basis_tightness_coverage
outputs:
  - factor_id: basis_tightness
    value_column: factor_basis_tightness
