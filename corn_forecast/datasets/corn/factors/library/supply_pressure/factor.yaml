id: supply_pressure
name: 供应压力因子
group: supply
instrument: corn
frequencies: [weekly, monthly, yearly]
inputs:
  - dce_corn_close
calculation:
  method: derived_from_existing_matrix
  expression: factor_supply_pressure
leakage_control:
  uses_future_target: false
  requires_lag: true
  asof_policy: period_end
quality:
  coverage_column: factor_supply_pressure_coverage
outputs:
  - factor_id: supply_pressure
    value_column: factor_supply_pressure
