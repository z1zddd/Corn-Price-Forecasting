id: weather_anomaly
name: 天气异常因子
group: weather
instrument: corn
frequencies: [weekly, monthly, yearly]
inputs:
  - dce_corn_close
calculation:
  method: derived_from_existing_matrix
  expression: factor_weather_anomaly
leakage_control:
  uses_future_target: false
  requires_lag: true
  asof_policy: period_end
quality:
  coverage_column: factor_weather_anomaly_coverage
outputs:
  - factor_id: weather_anomaly
    value_column: factor_weather_anomaly
