id: processing_demand
name: 加工需求因子
group: demand
instrument: corn
frequencies: [weekly, monthly, yearly]
inputs:
  - dce_corn_close
calculation:
  method: derived_from_existing_matrix
  expression: factor_processing_demand
leakage_control:
  uses_future_target: false
  requires_lag: true
  asof_policy: period_end
quality:
  coverage_column: factor_processing_demand_coverage
outputs:
  - factor_id: processing_demand
    value_column: factor_processing_demand
