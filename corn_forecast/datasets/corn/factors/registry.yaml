version: 1
instrument: corn
description: Registry for corn factor definitions and long-form factor values.

storage:
  library_root: library
  matrix_root: matrix
  value_schema:
    - period_end
    - period_key
    - frequency
    - instrument
    - factor_id
    - value
    - coverage
    - asof_date
    - quality_flag
    - source_version

factors:
  price_momentum:
    path: library/price_momentum
    group: price
    default_enabled: true
    frequencies: [weekly, monthly, yearly]
    outputs: [price_momentum]

  basis_tightness:
    path: library/basis_tightness
    group: basis
    default_enabled: true
    frequencies: [weekly, monthly, yearly]
    outputs: [basis_tightness]

  processing_demand:
    path: library/processing_demand
    group: demand
    default_enabled: true
    frequencies: [weekly, monthly, yearly]
    outputs: [processing_demand]

  market_activity:
    path: library/market_activity
    group: market
    default_enabled: true
    frequencies: [weekly, monthly, yearly]
    outputs: [market_activity]

  external_support:
    path: library/external_support
    group: external
    default_enabled: true
    frequencies: [weekly, monthly, yearly]
    outputs: [external_support]

  weather_anomaly:
    path: library/weather_anomaly
    group: weather
    default_enabled: true
    frequencies: [weekly, monthly, yearly]
    outputs: [weather_anomaly]

  supply_pressure:
    path: library/supply_pressure
    group: supply
    default_enabled: true
    frequencies: [weekly, monthly, yearly]
    outputs: [supply_pressure]

  risk_volatility:
    path: library/risk_volatility
    group: risk
    default_enabled: true
    frequencies: [weekly, monthly, yearly]
    outputs: [risk_volatility]

  harvest_pressure:
    path: library/harvest_pressure
    group: harvest
    default_enabled: true
    frequencies: [weekly, monthly, yearly]
    outputs: [harvest_pressure]
    notes:
      - Source matrices do not currently include factor_harvest_pressure_coverage.

  seasonal:
    path: library/seasonal
    group: calendar
    default_enabled: true
    frequencies: [weekly, monthly, yearly]
    outputs: [seasonal_sin, seasonal_cos]
    notes:
      - Calendar encodings are grouped together because they are two outputs of one seasonal transform.

  monthly_v1_price_trend:
    path: library/monthly_v1/price_trend
    group: price
    default_enabled: false
    frequencies: [monthly]
    outputs: [price_momentum_1m, price_momentum_3m, price_ma_gap_6m]

  monthly_v1_risk_volatility:
    path: library/monthly_v1/risk_volatility
    group: risk
    default_enabled: false
    frequencies: [monthly]
    outputs: [price_range_1m, price_volatility_3m, volatility_ratio_3m_12m]

  monthly_v1_market_activity:
    path: library/monthly_v1/market_activity
    group: market
    default_enabled: false
    frequencies: [monthly]
    outputs: [volume_log_change_1m, open_interest_log_change_1m]

  monthly_v1_basis_tightness:
    path: library/monthly_v1/basis_tightness
    group: basis
    default_enabled: false
    frequencies: [monthly]
    outputs: [basis_rate_level_lag1, basis_rate_zscore_12m_lag1]

  monthly_v1_term_structure:
    path: library/monthly_v1/term_structure
    group: term_structure
    default_enabled: false
    frequencies: [monthly]
    outputs: [nearby_main_spread_ratio_lag1, nearby_main_spread_change_1m_lag1]

  monthly_v1_processing_spread_proxy:
    path: library/monthly_v1/processing_spread_proxy
    group: processing
    default_enabled: false
    frequencies: [monthly]
    outputs: [starch_corn_spread_ratio]

  monthly_v1_cross_market_support:
    path: library/monthly_v1/cross_market_support
    group: external
    default_enabled: false
    frequencies: [monthly]
    outputs: [cbot_corn_momentum_1m, domestic_minus_cbot_momentum_1m]

  monthly_v1_realized_weather_anomaly:
    path: library/monthly_v1/realized_weather_anomaly
    group: weather
    default_enabled: false
    frequencies: [monthly]
    outputs: [precip_anomaly_same_month, temperature_anomaly_same_month, hot_dry_weather_stress]

  monthly_v1_harvest_season_proxy:
    path: library/monthly_v1/harvest_season_proxy
    group: harvest
    default_enabled: false
    frequencies: [monthly]
    outputs: [harvest_season_share]

  monthly_v1_seasonal:
    path: library/monthly_v1/seasonal
    group: calendar
    default_enabled: false
    frequencies: [monthly]
    outputs: [seasonal_sin, seasonal_cos]

  daily_v1_price_trend:
    path: library/daily_v1/factor_set.yaml
    group: price
    default_enabled: false
    frequencies: [daily]
    outputs: [price_momentum_1d, price_momentum_5d, price_momentum_20d, price_ma_gap_5d, price_ma_gap_20d, price_ma_gap_60d]

  daily_v1_risk_volatility:
    path: library/daily_v1/factor_set.yaml
    group: risk
    default_enabled: false
    frequencies: [daily]
    outputs: [price_range_1d, price_volatility_5d, price_volatility_20d, volatility_ratio_5d_20d]

  daily_v1_market_activity:
    path: library/daily_v1/factor_set.yaml
    group: market
    default_enabled: false
    frequencies: [daily]
    outputs: [volume_log_change_1d, open_interest_log_change_1d]

  daily_v1_basis_tightness:
    path: library/daily_v1/factor_set.yaml
    group: basis
    default_enabled: false
    frequencies: [daily]
    outputs: [basis_rate_level_lag1d, basis_rate_change_1d_lag1d, basis_rate_zscore_20d_lag1d]

  daily_v1_term_structure:
    path: library/daily_v1/factor_set.yaml
    group: term_structure
    default_enabled: false
    frequencies: [daily]
    outputs: [nearby_main_spread_ratio_lag1d, nearby_main_spread_change_1d_lag1d]

  daily_v1_processing_spread_proxy:
    path: library/daily_v1/factor_set.yaml
    group: processing
    default_enabled: false
    frequencies: [daily]
    outputs: [starch_corn_spread_ratio, starch_corn_spread_change_5d]

  daily_v1_cross_market_support:
    path: library/daily_v1/factor_set.yaml
    group: external
    default_enabled: false
    frequencies: [daily]
    outputs: [cbot_corn_momentum_1d_lag1d, cbot_corn_momentum_5d_lag1d, domestic_minus_cbot_momentum_1d_lag1d, cbot_wheat_corn_ratio_change_1d_lag1d]

  daily_v1_realized_weather:
    path: library/daily_v1/factor_set.yaml
    group: weather
    default_enabled: false
    frequencies: [daily]
    outputs: [precipitation_sum_5d, precipitation_week_vs_month, temperature_deviation_20d]

  daily_v1_calendar:
    path: library/daily_v1/factor_set.yaml
    group: calendar
    default_enabled: false
    frequencies: [daily]
    outputs: [day_of_year_sin, day_of_year_cos, day_of_week_sin, day_of_week_cos]

  daily_market_v1_spot_price:
    path: library/daily_market_v1/factor_set.yaml
    group: spot
    default_enabled: false
    frequencies: [daily]
    outputs: [corn_spot_momentum_5d, corn_spot_momentum_20d, corn_spot_dce_basis, corn_regional_dispersion]

  daily_market_v1_quote_quality:
    path: library/daily_market_v1/factor_set.yaml
    group: quality
    default_enabled: false
    frequencies: [daily]
    outputs: [corn_quote_count_log, corn_source_count_log, corn_confidence_mean]

  daily_market_v1_processing_spread:
    path: library/daily_market_v1/factor_set.yaml
    group: processing
    default_enabled: false
    frequencies: [daily]
    outputs: [starch_corn_spread_ratio, starch_corn_spread_change_5d]

  daily_market_v1_byproduct_pressure:
    path: library/daily_market_v1/factor_set.yaml
    group: processing
    default_enabled: false
    frequencies: [daily]
    outputs: [byproduct_momentum_5d, byproduct_momentum_20d]

  daily_market_v1_processing_chain:
    path: library/daily_market_v1/factor_set.yaml
    group: demand
    default_enabled: false
    frequencies: [daily]
    outputs: [processing_chain_momentum_20d]

factor_sets:
  daily_market_v1:
    status: shadow_candidate
    source: external_raw_quotes_and_normalized_prices
    source_files_committed: false
    frequency: daily_dce_trading_rows
    prediction_contract: release_available_by_dce_cutoff_to_next_actual_dce_row
    library_root: library/daily_market_v1
    matrix: matrix/corn_market_daily_factors_v1.csv
    manifest: daily_market_v1_manifest.json
    data_gaps: daily_market_v1_data_gaps.yaml
    candidate_factor_count: 12
    strict_backtest_eligible: false
    default_enabled: false
    notes:
      - Source rows are stored externally because authorization and record-level provenance are unresolved.
      - Historical source vintages are not point-in-time verified.
      - Use as a shadow residual overlay beside the long-history daily_v1 base model.

  daily_v1:
    status: candidate
    source: ../raw/玉米价格原始数据.csv
    frequency: daily_dce_trading_rows
    prediction_contract: dce_row_t_to_next_actual_dce_row
    library_root: library/daily_v1
    matrix: matrix/corn_factors_daily_v1.csv
    manifest: daily_v1_manifest.json
    data_gaps: daily_v1_data_gaps.yaml
    candidate_factor_count: 30
    strict_backtest_eligible: true
    default_enabled: false
    notes:
      - Basis, 100PPI, and CBOT inputs are lagged by one DCE row.
      - Rolling warm-up and raw source gaps remain missing.
      - Existing monthly, weekly, yearly, and model configuration files remain unchanged.

  monthly_v1:
    status: candidate
    source: ../processed/corn_monthly_core_v1.csv
    frequency: monthly
    prediction_contract: month_t_to_month_t_plus_1
    library_root: library/monthly_v1
    matrix: matrix/corn_factors_monthly_v1.csv
    manifest: monthly_v1_manifest.json
    data_gaps: monthly_v1_data_gaps.yaml
    candidate_factor_count: 21
    strict_backtest_eligible: true
    default_enabled: false
    notes:
      - Existing legacy factor materials remain unchanged for comparison.
      - Weekly and yearly factor redesign is deferred.
      - Supply pressure is excluded until observed supply data is added.
