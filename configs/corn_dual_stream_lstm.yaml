commodity:
  name: corn
  exchange: DCE
  frequency: monthly

data:
  csv_path: corn_forecast/datasets/corn/processed/玉米价格月度_混合特征无缺失值双头LSTM版.csv
  date_col: last_trade_date
  price_col: dce_corn_close
  feature_cols: auto_numeric
  encoding:
    - utf-8
    - gbk
    - gb18030
  exclude_feature_cols:
    - target_price_fwd
    - target_return_fwd
    - target_direction_fwd
    - dce_corn_close_next_month
    - dce_corn_close_next_month_ret
    - spike

target:
  horizon: 1
  mode: classification
  spike_threshold: 0.0

lookback:
  candidates: [3, 6, 9]
  default: 6

train_window:
  mode: expanding
  min_train_periods: 36
  stride_periods: 1
  window_size_periods: null
  max_train_periods: null
  target_known_only: true

split:
  val_ratio: 0.10

evaluation:
  primary_metric: direction_accuracy
  ci_level: 0.95
  ci_bootstrap_samples: 200

honest_bounds:
  dir_acc_floor: 0.50
  dir_acc_ceiling: 0.60
  sharpe_floor: -0.20
  sharpe_ceiling: 1.00

models:
  - name: dual_stream_lstm
    type: dual_stream_lstm
    enabled: true
    params:
      hidden_size: 32
      num_layers: 1
      attn_size: 16
      dense_size: 32
      dropout: 0.10
      epochs: 20
      batch_size: 16
      lr: 0.001
      patience: 5
      device: cpu
      random_state: 42
      news_prefix: pca_
