commodity:
  name: soybean
  exchange: DCE
  frequency: monthly

data:
  csv_path: local_data/soybean.csv
  date_col: date
  price_col: close
  feature_cols: auto_numeric
  encoding:
    - utf-8
    - utf-8-sig
    - gbk
    - gb18030
  exclude_feature_cols:
    - target_price_fwd
    - target_return_fwd
    - target_direction_fwd

target:
  horizon: 1
  mode: classification
  spike_threshold: 0.0

lookback:
  candidates: [3, 6, 12]
  default: 6

train_window:
  mode: expanding_with_cap
  min_train_periods: 24
  stride_periods: 1
  window_size_periods: null
  max_train_periods: 96

split:
  val_ratio: 0.10

evaluation:
  primary_metric: direction_accuracy
  ci_level: 0.95
  ci_bootstrap_samples: 500

honest_bounds:
  dir_acc_floor: 0.50
  dir_acc_ceiling: 0.56
  sharpe_floor: -0.20
  sharpe_ceiling: 0.80

models:
  - last_return
  - logistic_regression
  - name: random_forest
    params:
      n_estimators: 100
      max_depth: 5
      min_samples_leaf: 3
      class_weight: balanced_subsample
      random_state: 42
