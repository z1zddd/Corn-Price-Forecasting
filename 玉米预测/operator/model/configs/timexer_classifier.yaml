name: timexer
class_path: src.models.deep.timexer.TimeXerClassifier
task: classification
params:
  d_model: 128
  d_ff: 128
  e_layers: 2
  n_heads: 4
  factor: 3
  dropout: 0.1
  activation: gelu
  patch_len: 4
  use_norm: true
  epochs: 80
  batch_size: 16
  lr: 0.0005
  weight_decay: 0.0001
  patience: 12
  min_delta: 0.00001
  grad_clip: 1.0
  device: cpu
