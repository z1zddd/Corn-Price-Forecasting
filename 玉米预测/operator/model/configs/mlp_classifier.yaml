name: mlp
class_path: src.models.classical.sklearn_models.MLPClassifierModel
task: classification
params:
  hidden_layer_sizes:
    - 64
    - 32
  activation: relu
  solver: adam
  alpha: 0.001
  learning_rate_init: 0.0005
  max_iter: 800
  early_stopping: true
  n_iter_no_change: 30
  random_state: 42
