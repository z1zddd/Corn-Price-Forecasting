name: structured_lstm
class_path: src.models.deep.structured_lstm.StructuredLSTMClassifier
task: classification
params:
  hidden_dim: 64
  dense_dim: 64
  dropout: 0.30
  epochs: 120
  batch_size: 16
  lr: 0.0005
  weight_decay: 0.0001
  patience: 15
  min_delta: 0.00001
  grad_clip: 1.0
  device: cpu
