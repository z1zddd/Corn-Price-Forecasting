task: past 12 months -> predict next month spike classification
source: github:z1zddd/-/script/LSTM双头校准概率版/rolling_backtest_top79_dual_lstm_platt_calibration.py protocol, TimeXer backbone
csv_path: 玉米预测/datasets/processed/corn_monthly_dual_stream_spike_github.csv
series_id: corn_monthly_timexer_all_numeric_spike_platt
frequency: monthly
date_col: month
date_format: "%y-%b"
price_col: dce_corn_close
target_col: spike
target_mode: classification
target_alignment: target_idx

# TimeXer treats the last feature as endogenous and all previous features as exogenous.
feature_cols: auto_numeric
endogenous_col: dce_corn_close
news_feature_prefix: pca_
exclude_feature_cols:
  - first_trade_date
  - last_trade_date
  - dce_corn_close_next_month
  - dce_corn_close_next_month_ret
  - spike
max_missing_ratio: 0.30

seq_len: 12
horizon: 1
include_today: true
split_method: ratio
train_ratio: 0.65
val_ratio: 0.20
scale_y: false

# Match rolling_backtest_top79_dual_lstm_platt_calibration.py:
# fit p=sigmoid(a*logit+b) on each run's past validation set only.
classification_evaluation: validation_platt
classification_threshold_strategy: fixed
calibrator_l2: 0.001
calibrator_max_iter: 100
