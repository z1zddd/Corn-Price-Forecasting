task: past 12 months -> predict next month dce_corn_close regression
source: github:z1zddd/-/script/LSTM month
csv_path: 玉米预测/datasets/processed/corn_monthly_mixed_github.csv
series_id: corn_monthly_github
frequency: monthly
date_col: month
price_col: dce_corn_close
feature_cols: auto_numeric
exclude_feature_cols:
  - first_trade_date
  - last_trade_date
  - dce_corn_close_next_month
  - dce_corn_close_next_month_ret
  - dce_corn_close_next_month_direction
max_missing_ratio: 0.30
seq_len: 12
horizon: 1
include_today: true
target_mode: price
split_method: ratio
train_ratio: 0.70
val_ratio: 0.15
scale_y: true
periods_per_year: 12
github_compatible_outputs: true
