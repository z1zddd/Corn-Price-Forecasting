task: past 12 months -> predict next month spike classification
source: github:z1zddd/-/script/LSTM双头版
csv_path: 玉米预测/datasets/processed/corn_monthly_dual_stream_spike_github.csv
series_id: corn_monthly_dual_stream_spike
frequency: monthly
date_col: month
date_format: "%y-%b"
price_col: dce_corn_close
target_col: spike
target_mode: classification
target_alignment: target_idx

# GitHub 原脚本按 RF importance ranking 取 top79；仓库没有附带 ranking CSV。
# 若拿到 original_rf_spike_feature_importance_ranking.csv，可设置 feature_rank_path 并保留 top_n: 79。
feature_cols: dual_stream_default
top_n: 79
structured_top_n: 57
news_top_n: 22
news_feature_prefix: pca_
exclude_feature_cols:
  - first_trade_date
  - last_trade_date
  - dce_corn_close_next_month
  - dce_corn_close_next_month_ret
  - spike
max_missing_ratio: 0.30

seq_len: 12
horizon: 1
include_today: true
split_method: ratio
train_ratio: 0.65
val_ratio: 0.20
scale_y: false
classification_threshold_strategy: validation_f1_weighted
