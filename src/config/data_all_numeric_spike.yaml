task: past 12 months -> predict next month spike classification
source: github:z1zddd/-/script/LSTM双头版 all-numeric-feature ablation
csv_path: 玉米预测/datasets/processed/corn_monthly_dual_stream_spike_github.csv
series_id: corn_monthly_all_numeric_spike
frequency: monthly
date_col: month
date_format: "%y-%b"
price_col: dce_corn_close
target_col: spike
target_mode: classification
target_alignment: target_idx

# No feature ranking/top-N filtering: keep every numeric feature except explicit leakage/target columns.
feature_cols: auto_numeric
news_feature_prefix: pca_
exclude_feature_cols:
  - first_trade_date
  - last_trade_date
  - dce_corn_close_next_month
  - dce_corn_close_next_month_ret
  - spike
max_missing_ratio: 0.30

seq_len: 12
horizon: 1
include_today: true
split_method: ratio
train_ratio: 0.65
val_ratio: 0.20
scale_y: false
classification_threshold_strategy: validation_f1_weighted
