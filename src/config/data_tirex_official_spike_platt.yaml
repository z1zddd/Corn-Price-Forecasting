task: past 12 months -> predict next month spike classification
source: github:z1zddd/-/script/LSTM双头校准概率版/rolling_backtest_top79_dual_lstm_platt_calibration.py protocol, official TiRex univariate zero-shot
csv_path: 玉米预测/datasets/processed/corn_monthly_dual_stream_spike_github.csv
series_id: corn_monthly_tirex_official_spike_platt
frequency: monthly
date_col: month
date_format: "%y-%b"
price_col: dce_corn_close
target_col: spike
target_mode: classification
target_alignment: target_idx

# TiRex-1 official zero-shot API is univariate. It does not consume the news
# stream or other covariates in this benchmark.
feature_cols:
  - dce_corn_close

seq_len: 12
horizon: 1
include_today: true
split_method: ratio
train_ratio: 0.65
val_ratio: 0.20
scale_x: false
scale_y: false

classification_evaluation: validation_platt
classification_threshold_strategy: fixed
calibrator_l2: 0.001
calibrator_max_iter: 100
